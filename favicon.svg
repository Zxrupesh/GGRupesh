<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" fill="#130e07"/>
  
  <!-- outer border -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#8b6f47" stroke-width="1"/>
  
  <!-- camera body -->
  <rect x="5" y="10" width="22" height="15" rx="1" fill="#2a1e12" stroke="#d4af37" stroke-width="1"/>
  
  <!-- lens ring -->
  <circle cx="15" cy="17" r="5.5" fill="#1a1208" stroke="#8b6f47" stroke-width="1"/>
  
  <!-- lens inner -->
  <circle cx="15" cy="17" r="3.5" fill="#0a1520" stroke="#4a3828" stroke-width="0.5"/>
  
  <!-- lens glint -->
  <circle cx="15" cy="17" r="1.5" fill="#050a10"/>
  <circle cx="13.5" cy="15.5" r="0.8" fill="rgba(255,255,255,0.12)"/>
  
  <!-- viewfinder -->
  <rect x="19" y="11.5" width="5" height="3.5" rx="0.5" fill="#0a0806" stroke="#8b6f47" stroke-width="0.5"/>
  
  <!-- shutter button -->
  <rect x="18" y="8.5" width="4" height="2.5" rx="0.5" fill="#a0826d" stroke="#8b6f47" stroke-width="0.5"/>
  
  <!-- flash unit -->
  <rect x="5" y="10" width="4" height="8" rx="0.5" fill="#1e1610" stroke="#8b6f47" stroke-width="0.5"/>
  <circle cx="7" cy="13" r="1.2" fill="#fffae0" opacity="0.6"/>
  
  <!-- film window dot -->
  <rect x="6.5" y="20" width="3" height="2" rx="0.3" fill="#0a0806" stroke="#6b5437" stroke-width="0.4"/>
  
  <!-- corner ticks (retro border detail) -->
  <path d="M1 5 L1 1 L5 1" fill="none" stroke="#d4af37" stroke-width="0.8"/>
  <path d="M27 1 L31 1 L31 5" fill="none" stroke="#d4af37" stroke-width="0.8"/>
  <path d="M1 27 L1 31 L5 31" fill="none" stroke="#d4af37" stroke-width="0.8"/>
  <path d="M27 31 L31 31 L31 27" fill="none" stroke="#d4af37" stroke-width="0.8"/>
</svg>
